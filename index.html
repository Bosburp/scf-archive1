<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chess Study Library | SCF</title>
    <meta name="description" content="A curated archive of original, high-quality chess studies from Study Creators & Friends. Browse by author, category, and side, or search the archive instantly.">
    <meta name="robots" content="index,follow">
    <meta property="og:title" content="The Chess Study Library | SCF">
    <meta property="og:description" content="A curated archive of original, high-quality chess studies from Study Creators & Friends.">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBmaWxsPSIjYzVhMDU5Ij48cGF0aCBkPSJNNTAgMTBsLTUgNWgtMTBsLTUgNSAxMCAxMGgtMTBsLTUgNSAyMCAyMEgyNWwtNSA1aDYwbC01LTVINTVsMjAtMjAtMTAtMTBoLTEwbDEwLTEwLTUtNS0xMC01LTUtNXoiLz48cmVjdCB4PSIzMCIgeT0iNzUiIHdpZHRoPSI0MCIgaGVpZ2h0PSIxMCIgcng9IjIiLz48L2c+PC9zdmc+">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Chess Study Library",
      "url": "https://studycreatorsandfriends.com",
      "description": "A curated archive of original, high-quality chess studies from Study Creators & Friends.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://studycreatorsandfriends.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
 <script>
/* =========================================================
   CHESS STUDY LIBRARY — V2 ARCHITECTURE UPGRADE
   (full feature-preserving refactor)
========================================================= */

const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?output=csv';
const authorSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?gid=1246433755&single=true&output=csv';

const FEATURED_KEYWORD = 'FEATURED';
const ITEMS_PER_PAGE = 12;

/* =========================================================
   STATE
========================================================= */

const state = {
    data: [],
    authors: [],

    filter: 'All',
    side: 'Any Side',
    author: null,

    page: 1,
    search: '',
    sort: 'newest',

    carouselIndex: 0
};

/* =========================================================
   DOM SHORTCUT
========================================================= */
const $ = (id) => document.getElementById(id);

/* =========================================================
   UTILITIES
========================================================= */

function escapeHTML(str = '') {
    return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function norm(str = '') {
    return str.toString().toLowerCase().trim();
}

function debounce(fn, delay = 120) {
    let t;
    return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), delay);
    };
}

/* =========================================================
   CSV PARSER (ROBUST)
========================================================= */

function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const n = text[i + 1];

        if (c === '"') {
            if (inQuotes && n === '"') {
                cell += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (c === ',' && !inQuotes) {
            row.push(cell);
            cell = '';
        } else if ((c === '\n' || c === '\r') && !inQuotes) {
            if (c === '\r' && n === '\n') i++;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
        } else {
            cell += c;
        }
    }

    if (row.length || cell) {
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

/* =========================================================
   DATA LOADING
========================================================= */

async function loadAuthorData() {
    try {
        const res = await fetch(authorSheetUrl);
        const csv = await res.text();
        const rows = parseCSV(csv);

        state.authors = rows.slice(1).map(r => ({
            author: r[0]?.trim(),
            bio: r[1]?.trim(),
            country: r[2]?.trim(),
            style: r[3]?.trim(),
            links: r[4]?.trim()
        })).filter(a => a.author);

    } catch (e) {
        console.error('Author load failed', e);
        state.authors = [];
    }
}

async function loadData() {
    await loadAuthorData();

    const res = await fetch(sheetUrl);
    const csv = await res.text();
    const rows = parseCSV(csv);

    state.data = rows.slice(1).map(c => ({
        side: c[1] || 'Universal',
        category: c[2] || 'General',
        title: c[3] || 'Untitled',
        author: c[4] || 'Anonymous',
        link: c[5] || '#',
        notes: c[6] || '',
        viewerNote: c[7] || '',
        image: c[8]?.includes('http')
            ? c[8]
            : 'https://images.unsplash.com/photo-1586165368502-1bad197a6461?auto=format&fit=crop&w=800&q=80',
        difficulty: c[9] || '',
        keyword: c[11] || '',
        featuredDescription: c[12] || ''
    })).reverse();

    renderAll();
}

/* =========================================================
   FEATURED
========================================================= */

function getFeatured() {
    return state.data.find(s =>
        (s.keyword || '').toUpperCase().includes(FEATURED_KEYWORD)
    ) || state.data[0];
}

/* =========================================================
   FILTERING
========================================================= */

function getFiltered() {
    return state.data.filter(i => {

        const searchOK =
            !state.search ||
            norm(i.title).includes(state.search) ||
            norm(i.author).includes(state.search) ||
            norm(i.category).includes(state.search) ||
            norm(i.notes).includes(state.search);

        const categoryOK =
            state.filter === 'All' ||
            i.category === state.filter;

        const sideOK =
            state.side === 'Any Side' ||
            i.side === state.side;

        const authorOK =
            !state.author ||
            norm(i.author) === norm(state.author);

        return searchOK && categoryOK && sideOK && authorOK;
    });
}

/* =========================================================
   SORTING
========================================================= */

function sortData(arr) {
    const a = [...arr];

    switch (state.sort) {
        case 'title-az': return a.sort((x, y) => x.title.localeCompare(y.title));
        case 'title-za': return a.sort((x, y) => y.title.localeCompare(x.title));
        case 'author-az': return a.sort((x, y) => x.author.localeCompare(y.author));
        case 'author-za': return a.sort((x, y) => y.author.localeCompare(x.author));
        default: return a;
    }
}

/* =========================================================
   MASTER RENDER
========================================================= */

function renderAll() {
    const filtered = sortData(getFiltered());

    renderArchive(filtered);
    renderCounter(filtered);
    renderPagination(filtered);
}

/* =========================================================
   ARCHIVE
========================================================= */

function renderArchive(filtered) {
    const grid = $('resultsGrid');

    const start = (state.page - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    if (!filtered.length) {
        grid.innerHTML = '';
        $('noResults').style.display = 'block';
        return;
    }

    $('noResults').style.display = 'none';

    grid.innerHTML = pageItems.map(card).join('');
}

/* =========================================================
   CARD
========================================================= */

function card(i) {
    return `
    <div class="chess-card">
        <a href="${i.link}" target="_blank">
            <img class="card-image" src="${i.image}" />
        </a>

        <div class="p-6">
            <div class="text-[10px] text-zinc-500 uppercase">${escapeHTML(i.category)}</div>

            <div class="text-lg parchment-text">${escapeHTML(i.title)}</div>

            <div class="gold-accent cursor-pointer"
                onclick="setAuthor('${escapeHTML(i.author)}')">
                ${escapeHTML(i.author)}
            </div>
        </div>
    </div>`;
}

/* =========================================================
   COUNTER
========================================================= */

function renderCounter(filtered) {
    $('liveCounter').textContent =
        (state.search || state.filter !== 'All' || state.side !== 'Any Side' || state.author)
            ? `FOUND ${filtered.length} STUDIES`
            : `TOTAL: ${state.data.length}`;
}

/* =========================================================
   PAGINATION
========================================================= */

function renderPagination(filtered) {
    const container = $('paginationContainer');

    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (totalPages <= 1) return container.innerHTML = '';

    const pages = [];

    const windowSize = 7;
    let start = Math.max(1, state.page - 3);
    let end = Math.min(totalPages, start + windowSize - 1);

    pages.push(`<button onclick="changePage(${state.page - 1})" ${state.page === 1 ? 'disabled' : ''}>←</button>`);

    for (let p = start; p <= end; p++) {
        pages.push(`<button onclick="changePage(${p})" class="${p === state.page ? 'active' : ''}">${p}</button>`);
    }

    pages.push(`<button onclick="changePage(${state.page + 1})" ${state.page === totalPages ? 'disabled' : ''}>→</button>`);

    container.innerHTML = pages.join('');
}

/* =========================================================
   PAGE CHANGE
========================================================= */

window.changePage = (p) => {
    const max = Math.ceil(getFiltered().length / ITEMS_PER_PAGE);
    state.page = Math.max(1, Math.min(max, p));
    renderAll();
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

/* =========================================================
   FILTER ACTIONS
========================================================= */

window.setAuthor = (a) => {
    state.author = a;
    state.page = 1;
    renderAll();
};

window.setFilter = (f) => {
    state.filter = f;
    state.page = 1;
    renderAll();
};

window.setSideFilter = (s) => {
    state.side = s;
    state.page = 1;
    renderAll();
};

/* =========================================================
   SEARCH
========================================================= */

$('searchInput').addEventListener('input', debounce(e => {
    state.search = e.target.value.toLowerCase();
    state.page = 1;
    renderAll();
}));

/* =========================================================
   SORT
========================================================= */

$('sortSelect').addEventListener('change', e => {
    state.sort = e.target.value;
    renderAll();
});

/* =========================================================
   UI TOGGLES
========================================================= */

window.toggleAbout = () => $('aboutPage').classList.toggle('hidden');
window.toggleSubmit = () => $('submitPage').classList.toggle('hidden');

window.toggleTheme = () => document.body.classList.toggle('light-mode');

/* =========================================================
   INIT
========================================================= */

loadData();
</script>
</body>
</html>
