<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Study Library</title>
<style>
/* (your existing CSS stays unchanged — not duplicated here) */
</style>
</head>

<body class="min-h-screen p-8 md:p-16">

<div id="cursorGlow"></div>
<div id="copyToast" class="copy-toast">Link Copied to Clipboard</div>

<button id="surpriseBtn" onclick="surpriseMe()">🎲</button>
<button id="themeToggle" onclick="toggleTheme()">🌓</button>
<button id="toTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div id="aboutPage" class="modal-overlay hidden">...</div>
<div id="submitPage" class="modal-overlay hidden">...</div>

<div class="max-w-6xl mx-auto site-layer">

<header class="text-center mb-20">
<h1>The Chess Study Library</h1>
</header>

<section id="featuredSection" class="mb-20 hidden">
<h3>Featured</h3>
<div id="featuredStudyContainer"></div>
</section>

<div class="max-w-2xl mx-auto mb-24 text-center">

<input id="searchInput" placeholder="Search..." />

<select id="sortSelect">
<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
<option value="title-az">A–Z</option>
<option value="title-za">Z–A</option>
<option value="author-az">Author A–Z</option>
<option value="author-za">Author Z–A</option>
</select>

<div id="filterContainer"></div>
<div id="sideFilterContainer"></div>

<div id="liveCounter"></div>
</div>

<div id="latestSection">
<div id="latestGrid"></div>
</div>

<h3 id="archiveHeader">Full Archive</h3>
<div id="noResults" style="display:none;">No results</div>
<div id="resultsGrid"></div>
<div id="paginationContainer"></div>

</div>

<script>
/* =========================
   CONFIG
========================= */
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?output=csv";
const authorSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?gid=1246433755&single=true&output=csv";

const ITEMS_PER_PAGE = 12;

/* =========================
   STATE
========================= */
let state = {
  data: [],
  authors: [],
  filter: "All",
  side: "Any Side",
  author: null,
  page: 1,
  sort: "newest",
  search: ""
};

let carouselPos = 0;
let carouselTimer = null;
let searchTimer = null;

/* =========================
   HELPERS
========================= */
const norm = s => (s || "").toString().toLowerCase().trim();

function escapeHTML(str){
  return (str||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

/* safer CSV parser */
function parseCSV(text){
  const rows = [];
  let row=[],cell="",q=false;

  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];

    if(c === '"' && q && n === '"'){ cell+='"'; i++; continue; }
    if(c === '"'){ q=!q; continue; }

    if(c === ',' && !q){ row.push(cell); cell=""; continue; }

    if((c === '\n' || c === '\r') && !q){
      if(c === '\r' && n === '\n') i++;
      row.push(cell);
      rows.push(row);
      row=[]; cell="";
      continue;
    }

    cell += c;
  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

/* =========================
   LOAD DATA
========================= */
async function load(){
  state.authors = await loadAuthors();

  const res = await fetch(sheetUrl);
  const csv = await res.text();
  const rows = parseCSV(csv).slice(1);

  state.data = rows.map(r => ({
    side: r[1] || "Universal",
    category: r[2] || "General",
    title: r[3] || "Untitled",
    author: r[4] || "Anonymous",
    link: r[5] || "#",
    notes: r[6] || "",
    viewerNote: r[7] || "",
    image: r[8]?.includes("http") ? r[8] : "",
    difficulty: r[9] || "",
    keyword: r[11] || "",
    featuredDescription: r[12] || ""
  })).reverse();

  renderAll();
}

async function loadAuthors(){
  try{
    const res = await fetch(authorSheetUrl);
    const csv = await res.text();
    return parseCSV(csv).slice(1).map(r => ({
      author:r[0], bio:r[1], country:r[2], style:r[3], links:r[4]
    }));
  } catch(e){
    return [];
  }
}

/* =========================
   FILTERING
========================= */
function isFeatured(i){
  return (i.keyword||"").toUpperCase().includes("FEATURED");
}

function matchSearch(i, s){
  if(!s) return true;
  s = s.toLowerCase();
  return Object.values(i).some(v => norm(v).includes(s));
}

function getFiltered(){
  let arr = [...state.data];

  arr = arr.filter(i => {
    if(state.filter !== "All" && i.category !== state.filter) return false;
    if(state.side !== "Any Side" && i.side !== state.side) return false;
    if(state.author && norm(i.author) !== norm(state.author)) return false;
    if(!matchSearch(i, state.search)) return false;
    return true;
  });

  switch(state.sort){
    case "title-az": arr.sort((a,b)=>a.title.localeCompare(b.title)); break;
    case "title-za": arr.sort((a,b)=>b.title.localeCompare(a.title)); break;
    case "author-az": arr.sort((a,b)=>a.author.localeCompare(b.author)); break;
    case "author-za": arr.sort((a,b)=>b.author.localeCompare(a.author)); break;
    case "oldest": arr.reverse(); break;
  }

  return arr;
}

/* =========================
   RENDER
========================= */
function card(i){
  return `
  <div class="card">
    <a href="${i.link}" target="_blank">
      <img src="${i.image}" onerror="this.style.display='none'">
    </a>

    <div>
      <div>${escapeHTML(i.category)}</div>
      <h3>${escapeHTML(i.title)}</h3>
      <p onclick="setAuthor('${escapeHTML(i.author)}')">${escapeHTML(i.author)}</p>
      <small>${escapeHTML(i.notes)}</small>
    </div>
  </div>`;
}

function renderArchive(){
  const filtered = getFiltered();

  const start = (state.page-1)*ITEMS_PER_PAGE;
  const page = filtered.slice(start,start+ITEMS_PER_PAGE);

  document.getElementById("resultsGrid").innerHTML =
    page.map(card).join("");

  document.getElementById("liveCounter").textContent =
    `${filtered.length} results`;

}

/* =========================
   ACTIONS
========================= */
function setAuthor(a){
  state.author = a;
  state.page = 1;
  renderArchive();
}

function setFilter(f){
  state.filter = f;
  state.page = 1;
  renderArchive();
}

function setSide(s){
  state.side = s;
  state.page = 1;
  renderArchive();
}

/* =========================
   SEARCH (debounced)
========================= */
document.getElementById("searchInput").addEventListener("input", e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    state.search = e.target.value;
    state.page = 1;
    renderArchive();
  },120);
});

/* =========================
   SORT
========================= */
document.getElementById("sortSelect").addEventListener("change",e=>{
  state.sort = e.target.value;
  renderArchive();
});

/* =========================
   INIT
========================= */
function renderAll(){
  renderArchive();
}

load();
</script>

</body>
</html>
