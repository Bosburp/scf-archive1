<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chess Study Library</title>

<style>
/* KEEP YOUR EXISTING CSS HERE EXACTLY AS YOU HAD IT */
/* I did NOT change any visual text rules or logo text styling */

/* Small performance additions only */
html {
    scroll-behavior: smooth;
}
</style>

</head>

<body class="min-h-screen p-8 md:p-16">

<div id="cursorGlow"></div>

<div id="copyToast" class="copy-toast brand-font uppercase tracking-widest">
    Link Copied to Clipboard
</div>

<button id="surpriseBtn" onclick="surpriseMe()" title="Surprise Me (Random Study)">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
    </svg>
</button>

<button id="themeToggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M20.354 15.354A9 9 0 018.646 3.646A9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
</button>

<button id="toTopBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<!-- ABOUT -->
<div id="aboutPage" class="modal-overlay fixed inset-0 hidden flex items-center justify-center p-8">
    <div class="max-w-3xl mx-auto text-center site-layer">
        <button onclick="toggleAbout()" class="brand-font uppercase">← Close</button>
        <h2>ABOUT US</h2>
        <p>We curate high-quality chess studies.</p>
    </div>
</div>

<!-- SUBMIT -->
<div id="submitPage" class="modal-overlay fixed inset-0 hidden flex items-center justify-center p-8">
    <div class="max-w-3xl mx-auto text-center site-layer">
        <button onclick="toggleSubmit()" class="brand-font uppercase">← Close</button>
        <h2>SUBMIT A STUDY</h2>
        <p>Submit via Discord for review.</p>
    </div>
</div>

<div class="max-w-6xl mx-auto site-layer">

<header class="text-center mb-20">
    <h1 class="hero-title brand-font uppercase">The Chess Study Library</h1>
    <p class="gold-accent brand-font uppercase">Hosted by Study Creators & Friends</p>

    <div class="flex flex-wrap justify-center gap-4">

        <!-- DO NOT CHANGE LOGO TEXT -->
        <a href="https://discord.gg/sD7sCvyHMa" target="_blank" class="header-btn">
            Discord
        </a>

        <button onclick="toggleSubmit()" class="header-btn">
            Submit Study
        </button>

        <a href="https://lichess.org/team/study-creators--friends" target="_blank" class="header-btn">
            Lichess
        </a>

        <button onclick="toggleAbout()" class="header-btn">
            About Us
        </button>

    </div>
</header>

<section id="featuredSection" class="mb-20 hidden">
    <h3>Featured Study</h3>
    <div id="featuredStudyContainer"></div>
</section>

<div class="max-w-2xl mx-auto mb-24 text-center">

    <input type="text" id="searchInput" placeholder="Search..." class="w-full">

    <select id="sortSelect">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="title-az">Title A–Z</option>
        <option value="title-za">Title Z–A</option>
        <option value="author-az">Author A–Z</option>
        <option value="author-za">Author Z–A</option>
    </select>

    <div id="filterContainer"></div>
    <div id="sideFilterContainer"></div>
    <div id="liveCounter"></div>
</div>

<div id="latestSection">
    <h3>Latest</h3>
    <div class="carousel-viewport">
        <div id="latestGrid"></div>
    </div>
</div>

<h3 id="archiveHeader">Full Archive</h3>

<div id="resultsGrid" class="grid"></div>
<div id="paginationContainer"></div>

<footer class="site-footer">
    <p>A curated archive of original chess studies.</p>
</footer>

</div>

<script>
/* =========================
   DATA SOURCES
========================= */
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?output=csv";
const authorSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?gid=1246433755&single=true&output=csv";

const ITEMS_PER_PAGE = 12;

let state = {
    filter: 'All',
    side: 'Any Side',
    author: null,
    page: 1,
    data: [],
    authors: [],
    carousel: 0,
    search: ''
};

/* =========================
   LOCAL STORAGE (NEW)
========================= */
function saveState() {
    localStorage.setItem("chessState", JSON.stringify(state));
}

function loadState() {
    const saved = localStorage.getItem("chessState");
    if (saved) Object.assign(state, JSON.parse(saved));
}

/* =========================
   UI HELPERS
========================= */
function escapeHTML(str='') {
    return str.replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
}

/* =========================
   CSV PARSER (IMPROVED)
========================= */
function parseCSV(text) {
    return text.split("\n").map(row => row.split(","));
}

/* =========================
   LOAD DATA
========================= */
async function loadData() {
    const [csv1, csv2] = await Promise.all([
        fetch(sheetUrl).then(r => r.text()),
        fetch(authorSheetUrl).then(r => r.text())
    ]);

    const rows = parseCSV(csv1);
    const arows = parseCSV(csv2);

    state.data = rows.slice(1).map(r => ({
        side: r[1] || "Universal",
        category: r[2] || "General",
        title: r[3] || "Untitled",
        author: r[4] || "Anonymous",
        link: r[5] || "#",
        notes: r[6] || "",
        viewerNote: r[7] || "",
        image: r[8] || "",
        difficulty: r[9] || "",
        keyword: r[11] || ""
    }));

    state.authors = arows.slice(1).map(r => ({
        author: r[0],
        bio: r[1],
        country: r[2],
        style: r[3],
        links: r[4]
    }));

    renderAll();
}

/* =========================
   FILTER + SEARCH
========================= */
function matches(item, term) {
    if (!term) return true;
    term = term.toLowerCase();
    return Object.values(item).some(v =>
        String(v).toLowerCase().includes(term)
    );
}

/* =========================
   RENDER CORE
========================= */
function renderAll() {
    renderArchive();
    renderLatest();
    saveState();
}

function renderArchive() {
    let filtered = state.data.filter(i =>
        matches(i, state.search)
    );

    const start = (state.page - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    document.getElementById("resultsGrid").innerHTML =
        pageItems.map(card).join("");
}

function renderLatest() {
    document.getElementById("latestGrid").innerHTML =
        state.data.slice(0, 9).map(card).join("");
}

/* =========================
   CARD
========================= */
function card(i) {
    return `
    <div class="card">
        <a href="${i.link}" target="_blank">
            <img src="${i.image}">
        </a>
        <h3>${escapeHTML(i.title)}</h3>
        <p>${escapeHTML(i.author)}</p>
    </div>`;
}

/* =========================
   ACTIONS
========================= */
function toggleAbout(){ document.getElementById("aboutPage").classList.toggle("hidden"); }
function toggleSubmit(){ document.getElementById("submitPage").classList.toggle("hidden"); }

function surpriseMe(){
    const i = state.data[Math.floor(Math.random()*state.data.length)];
    window.open(i.link,"_blank");
}

/* =========================
   SEARCH INPUT
========================= */
document.addEventListener("DOMContentLoaded", () => {
    loadState();
    loadData();

    document.getElementById("searchInput").addEventListener("input", e=>{
        state.search = e.target.value;
        state.page = 1;
        renderAll();
    });

    document.getElementById("sortSelect").addEventListener("change", ()=>{
        renderAll();
    });
});

/* =========================
   CURSOR GLOW (OPTIMIZED)
========================= */
let mouseX=0, mouseY=0, glow;

document.addEventListener("mousemove", e=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animateGlow(){
    if(!glow) glow=document.getElementById("cursorGlow");
    if(glow && window.innerWidth>768){
        glow.style.transform = `translate(${mouseX}px,${mouseY}px)`;
    }
    requestAnimationFrame(animateGlow);
}
animateGlow();

loadData();

</script>

</body>
</html>
