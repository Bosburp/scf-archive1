<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Study Library</title>

<style>
/* =========================
   BASE
========================= */
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --text:#e7e7e7;
  --muted:#a1a1a1;
  --accent:#c5a059;
  --border:#1f1f1f;
}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* =========================
   LAYOUT
========================= */
.site-layer{
  max-width:1200px;
  margin:0 auto;
  padding:40px 20px;
}

/* =========================
   HEADER
========================= */
header{
  text-align:center;
  margin-bottom:60px;
}

h1{
  font-size:28px;
  letter-spacing:0.3em;
  text-transform:uppercase;
}

.sub{
  font-size:11px;
  color:var(--accent);
  letter-spacing:0.3em;
}

/* =========================
   BUTTONS
========================= */
button, .chip{
  cursor:pointer;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  padding:8px 12px;
  font-size:11px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  transition:0.2s;
}

button:hover, .chip:hover{
  border-color:var(--accent);
  color:var(--accent);
}

/* =========================
   SEARCH
========================= */
.search{
  width:100%;
  padding:14px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  outline:none;
  margin-bottom:20px;
}

/* =========================
   FILTER ROW
========================= */
.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

/* =========================
   FEATURED
========================= */
.featured{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:20px;
  margin-bottom:60px;
  border:1px solid var(--border);
  background:var(--panel);
}

.featured img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.featured-content{
  padding:30px;
}

.featured-title{
  font-size:22px;
  margin:10px 0;
}

.tag{
  font-size:10px;
  color:var(--accent);
  letter-spacing:0.2em;
}

/* =========================
   GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}

/* =========================
   CARD
========================= */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  overflow:hidden;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:14px;
}

.card-title{
  font-size:14px;
  margin:6px 0;
}

.card-meta{
  font-size:10px;
  color:var(--muted);
}

/* =========================
   MODAL
========================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  padding:30px;
}

.modal-inner{
  max-width:700px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:30px;
}

/* =========================
   SMALL UI
========================= */
.counter{
  text-align:center;
  margin:20px 0;
  color:var(--accent);
  font-size:11px;
  letter-spacing:0.2em;
}
</style>
</head>

<body>

<div class="site-layer">

<header>
<h1>Chess Study Library</h1>
<div class="sub">Study Creators & Friends</div>
</header>

<input id="searchInput" class="search" placeholder="Search studies...">

<div class="row">
<select id="sortSelect">
<option value="newest">Newest</option>
<option value="title-az">A–Z</option>
<option value="title-za">Z–A</option>
<option value="author-az">Author A–Z</option>
<option value="author-za">Author Z–A</option>
</select>
</div>

<div id="filterContainer" class="row"></div>
<div id="sideFilterContainer" class="row"></div>

<div id="counter" class="counter"></div>

<!-- FEATURED -->
<div id="featured"></div>

<!-- GRID -->
<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-inner" id="modalInner"></div>
</div>

</body>
   <script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHRh0KZ6s0XfeHMyIFdR-WjWI_t7QOfR8gknJOLZpJlAKkDEWtoDw-RpqHj27TAv17t7xvcfNGqn13/pub?output=csv";

let data = [];
let filter = "All";
let side = "Any";
let search = "";
let sort = "newest";

/* =========================
   LOAD
========================= */
async function load(){
  const res = await fetch(sheetUrl);
  const text = await res.text();

  const rows = parseCSV(text).slice(1);

  data = rows.map(r => ({
    side:r[1],
    category:r[2],
    title:r[3],
    author:r[4],
    link:r[5],
    notes:r[6],
    image:r[8] || "",
    difficulty:r[9]
  })).reverse();

  render();
}

/* =========================
   CSV
========================= */
function parseCSV(t){
  const rows=[], row=[], cell="";
  let r=[], c="", q=false;

  for(let i=0;i<t.length;i++){
    const ch=t[i], nx=t[i+1];

    if(ch=='"' && q && nx=='"'){ c+='"'; i++; continue; }
    if(ch=='"'){ q=!q; continue; }

    if(ch==',' && !q){ r.push(c); c=""; continue; }

    if((ch=='\n'||ch=='\r') && !q){
      if(ch=='\r'&&nx=='\n') i++;
      r.push(c);
      rows.push(r);
      r=[]; c="";
      continue;
    }

    c+=ch;
  }

  return rows;
}

/* =========================
   FILTER
========================= */
function getFiltered(){
  return data.filter(i=>{
    const okSearch = !search || Object.values(i).join(" ").toLowerCase().includes(search.toLowerCase());
    const okFilter = filter==="All" || i.category===filter;
    const okSide = side==="Any" || i.side===side;
    return okSearch && okFilter && okSide;
  });
}

/* =========================
   SORT
========================= */
function sortData(arr){
  const a=[...arr];

  if(sort==="title-az") a.sort((x,y)=>x.title.localeCompare(y.title));
  if(sort==="title-za") a.sort((x,y)=>y.title.localeCompare(x.title));
  if(sort==="author-az") a.sort((x,y)=>x.author.localeCompare(y.author));
  if(sort==="author-za") a.sort((x,y)=>y.author.localeCompare(x.author));
  if(sort==="oldest") a.reverse();

  return a;
}

/* =========================
   RENDER
========================= */
function render(){
  let filtered = sortData(getFiltered());

  document.getElementById("counter").innerText =
    filtered.length + " studies";

  renderFeatured(filtered[0]);
  renderGrid(filtered);
  renderFilters();
}

/* =========================
   FEATURED
========================= */
function renderFeatured(i){
  if(!i) return;

  document.getElementById("featured").innerHTML = `
    <div class="featured">
      <img src="${i.image}">
      <div class="featured-content">
        <div class="tag">${i.category}</div>
        <h2 class="featured-title">${i.title}</h2>
        <p>${i.author}</p>
        <small>${i.notes}</small>
      </div>
    </div>
  `;
}

/* =========================
   GRID
========================= */
function renderGrid(arr){
  document.getElementById("grid").innerHTML =
    arr.map(i=>`
      <div class="card" onclick="openModal('${i.title}','${i.notes}')">
        <img src="${i.image}">
        <div class="card-body">
          <div class="card-meta">${i.category}</div>
          <div class="card-title">${i.title}</div>
          <div class="card-meta">${i.author}</div>
        </div>
      </div>
    `).join("");
}

/* =========================
   FILTERS
========================= */
function renderFilters(){
  const cats = ["All",...new Set(data.map(i=>i.category))];
  const sides = ["Any","White","Black","Universal"];

  document.getElementById("filterContainer").innerHTML =
    cats.map(c=>`<button onclick="setFilter('${c}')">${c}</button>`).join("");

  document.getElementById("sideFilterContainer").innerHTML =
    sides.map(s=>`<button onclick="setSide('${s}')">${s}</button>`).join("");
}

function setFilter(f){filter=f;render();}
function setSide(s){side=s;render();}

/* =========================
   SEARCH
========================= */
document.getElementById("searchInput").addEventListener("input",e=>{
  search=e.target.value;
  render();
});

document.getElementById("sortSelect").addEventListener("change",e=>{
  sort=e.target.value;
  render();
});

/* =========================
   MODAL
========================= */
function openModal(title,notes){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalInner").innerHTML=
    `<h2>${title}</h2><p>${notes}</p>`;
}

document.getElementById("modal").onclick=()=> {
  document.getElementById("modal").style.display="none";
};

/* INIT */
load();
</script>
</html>
